# LedgerX — Local Development
# Usage: docker-compose up -d
# PostgreSQL: localhost:5433  Redis: localhost:6379
# Dev only (postgres + redis): docker-compose up -d postgres redis

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ledgerx
      POSTGRES_PASSWORD: ledgerx
      POSTGRES_DB: ledgerx
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./ledgerx/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ledgerx:ledgerx@postgres:5432/ledgerx
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./ledgerx/backend
      dockerfile: Dockerfile
    working_dir: /app
    command: celery -A worker.celery_app worker --loglevel=info
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql://ledgerx:ledgerx@postgres:5432/ledgerx
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - backend
      - redis

  web:
    build:
      context: ./ledgerx/apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
