# LedgerX — Local Development
# Usage: docker-compose up -d
# PostgreSQL: localhost:5432  Redis: localhost:6379

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ledgerx
      POSTGRES_PASSWORD: ledgerx
      POSTGRES_DB: ledgerx
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
